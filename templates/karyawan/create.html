{% extends 'base.html' %}

{% block content %}

<div class="row">
    <div class="col-12">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <div>
                <h1 class="fs-3 mb-1">Tambah Karyawan</h1>
                <p class="mb-0">Input data karyawan baru</p>
            </div>

            <div>
                <a href="{% url 'list_karyawan' %}" class="btn btn-primary">
                    Kembali ke Data Karyawan
                </a>
            </div>
        </div>

    </div>
</div>

<div class="row">
    <div class="col-12">

        <div class="card">
            <div class="card-body p-4">

                <form method="POST">

                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Nama Karyawan
                            </label>

                            <input
                                type="text"
                                name="nama"
                                class="form-control"
                                placeholder="Masukkan nama karyawan"
                                required
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Jabatan
                            </label>

                            <input
                                type="text"
                                name="jabatan"
                                class="form-control"
                                placeholder="Masukkan jabatan"
                                required
                            >
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Tanggal Bergabung
                        </label>

                        <input
                            type="date"
                            name="tgl_bergabung"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-primary"
                        >
                            Simpan Data
                        </button>

                        <button
                            type="reset"
                            class="btn btn-secondary"
                        >
                            Reset
                        </button>

                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

<div class="row">
    <div class="col-12">
        <footer class="text-center py-2 mt-4 text-secondary">
            <p class="mb-0">
                Copyright © 2026 Sistem Informasi Keuangan
            </p>
        </footer>
    </div>
</div>

{% endblock %}
